<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body { font-family: "Segoe UI", sans-serif; max-width: 420px; margin: 50px auto; padding: 24px; background: #f5f7fb; color: #1f2937; }
        .card { background: #ffffff; border-radius: 14px; padding: 28px; box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08); }
        h1 { margin-top: 0; font-size: 28px; }
        p { color: #4b5563; }
        label { display: block; margin-top: 14px; font-weight: 600; }
        input { width: 100%; padding: 12px; margin-top: 6px; border-radius: 8px; border: 1px solid #d1d5db; box-sizing: border-box; }
        button { width: 100%; margin-top: 18px; padding: 12px; border: none; border-radius: 8px; background: #1d4ed8; color: white; font-weight: 700; cursor: pointer; }
        .flash { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; padding: 10px 12px; border-radius: 8px; margin-bottom: 14px; }
        a { display: inline-block; margin-top: 12px; color: #1d4ed8; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Login</h1>
        <p>Pick up where you left off.</p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="flash">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <label for="email">Email</label>
            <input id="email" type="email" name="email" required>

            <label for="password">Password</label>
            <input id="password" type="password" name="password" required>

            <button type="submit">Login</button>
        </form>

        <a href="{{ url_for('register') }}">Create an account</a>
        <br>
        <a href="{{ url_for('admin_login') }}">Admin portal</a>
    </div>
</body>
</html>
