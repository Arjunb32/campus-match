<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preferences</title>
    <style>
        body { font-family: "Segoe UI", sans-serif; max-width: 560px; margin: 40px auto; padding: 24px; background: #f7fafc; color: #1f2937; }
        .card { background: white; border-radius: 14px; padding: 28px; box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08); }
        label { display: block; font-weight: 600; margin-top: 14px; }
        input, select { width: 100%; padding: 12px; margin-top: 6px; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; }
        button { margin-top: 20px; width: 100%; padding: 12px; border: none; border-radius: 8px; background: #b45309; color: white; font-weight: 700; cursor: pointer; }
        .flash { background: #fff7ed; color: #9a3412; border: 1px solid #fed7aa; padding: 10px 12px; border-radius: 8px; margin-bottom: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Partner Preferences</h1>
        <p>Tell the app what kind of match you want to see.</p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="flash">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('set_preferences') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <label for="pref_gender">Preferred Gender</label>
            <select id="pref_gender" name="pref_gender" required>
                {% for option in ['Any', 'Female', 'Male', 'Non-binary'] %}
                    <option value="{{ option }}" {% if preferences.pref_gender == option %}selected{% endif %}>{{ option }}</option>
                {% endfor %}
            </select>

            <label for="pref_year">Preferred Year</label>
            <select id="pref_year" name="pref_year" required>
                {% for option in ['Any', '1st Year', '2nd Year', '3rd Year', '4th Year'] %}
                    <option value="{{ option }}" {% if preferences.pref_year == option %}selected{% endif %}>{{ option }}</option>
                {% endfor %}
            </select>

            <label for="pref_vibe">Preferred Vibe</label>
            <select id="pref_vibe" name="pref_vibe" required>
                {% for option in ['Chill', 'Party', 'Studious', 'Adventurous'] %}
                    <option value="{{ option }}" {% if preferences.pref_vibe == option %}selected{% endif %}>{{ option }}</option>
                {% endfor %}
            </select>

            <label for="pref_hobbies">Preferred Hobbies</label>
            <input id="pref_hobbies" type="text" name="pref_hobbies" value="{{ preferences.pref_hobbies or '' }}" placeholder="Movies, coding, sports, books">

            <button type="submit">Save Preferences</button>
        </form>
    </div>
</body>
</html>
