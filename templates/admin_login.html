<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 420px; margin: 60px auto; text-align: center; background: #f5f7fb; padding: 25px; border-radius: 12px; }
        h2 { margin-top: 0; }
        input { display: block; width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #d9d9d9; border-radius: 6px; }
        button { background-color: #2f6fed; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 6px; width: 100%; font-weight: 600; }
        button:hover { background-color: #2559be; }
        a { display: block; margin-top: 12px; color: #2f6fed; text-decoration: none; }
        .error { color: #d93025; font-weight: 600; }
    </style>
</head>
<body>
    <h2>Admin Portal</h2>
    <p>Use your admin credentials to manage users.</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <p class="error">{{ messages[0] }}</p>
      {% endif %}
    {% endwith %}

    <form method="POST" action="/admin/login">
        <label>Username:</label>
        <input type="text" name="username" required>

        <label>Password:</label>
        <input type="password" name="password" required>

        <button type="submit">Login as Admin</button>
    </form>

    <a href="/login">Back to User Login</a>
</body>
</html>
