<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email</title>
    <style>
        body { font-family: "Segoe UI", sans-serif; max-width: 460px; margin: 50px auto; padding: 24px; background: #f8fafc; color: #1f2937; }
        .card { background: white; border-radius: 14px; padding: 28px; box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08); }
        label { display: block; font-weight: 600; margin-top: 14px; }
        input { width: 100%; padding: 12px; margin-top: 6px; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; letter-spacing: 0.3em; text-align: center; font-size: 20px; }
        button { width: 100%; padding: 12px; margin-top: 18px; border: none; border-radius: 8px; background: #1d4ed8; color: white; font-weight: 700; cursor: pointer; }
        .secondary { background: #e5e7eb; color: #111827; }
        .flash { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; padding: 10px 12px; border-radius: 8px; margin-bottom: 14px; }
        .actions { display: grid; gap: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Verify Your Email</h1>
        <p>Enter the 6-digit code sent to <strong>{{ user.email }}</strong>.</p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="flash">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('verify_email') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <label for="code">Verification Code</label>
            <input id="code" type="text" name="code" maxlength="6" placeholder="123456" required>

            <button type="submit">Verify Email</button>
        </form>

        <form method="POST" action="{{ url_for('resend_verification') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button type="submit" class="secondary">Resend Code</button>
        </form>
    </div>
</body>
</html>
